<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Download Best&Less App</title>

  <!-- Mobile-friendly -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Prevent caching (helps QR scans) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffffff;
  }

  .container {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  </style>
</head>

<body>
  <div class="container">
    <!-- Fallback image (also clickable) -->
    <img
      src="app-download.jpg"
      alt="Download the Best&Less App"
      id="downloadImage"
    />
  </div>

  <script>
    (function () {
      const iosUrl = "https://apps.apple.com/au/app/best-less/id6450524262";
      const androidUrl = "https://play.google.com/store/apps/details?id=au.com.bestandless";

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      let targetUrl = null;

      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        targetUrl = iosUrl;
      } else if (/android/i.test(userAgent)) {
        targetUrl = androidUrl;
      }

      // Auto redirect after short delay
      if (targetUrl) {
        setTimeout(function () {
          window.location.href = targetUrl;
        }, 800);
      }

      // Fallback: image tap redirects
      document.getElementById("downloadImage").addEventListener("click", function () {
        if (targetUrl) {
          window.location.href = targetUrl;
        }
      });
    })();
  </script>
</body>
</html>
``
